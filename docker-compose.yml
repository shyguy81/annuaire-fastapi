services:
  postgres:
    image: postgres:15
    container_name: annuaire-postgres
    environment:
      POSTGRES_DB: annuaire_contacts
      POSTGRES_USER: annuaire_user
      POSTGRES_PASSWORD: annuaire_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annuaire_user -d annuaire_contacts"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: annuaire-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+psycopg2://annuaire_user:annuaire_password@postgres:5432/annuaire_contacts
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
